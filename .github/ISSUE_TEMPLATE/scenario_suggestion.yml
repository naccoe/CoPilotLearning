name: "💡 Scenario Suggestion"
description: Suggest a new training scenario, use case, or improvement to an existing one
title: "[Suggestion]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What's your idea?
      description: Describe the new scenario or improvement you'd like to see.
      placeholder: "It would be great to have a scenario that covers..."
    validations:
      required: true
  - type: dropdown
    id: skill-level
    attributes:
      label: What skill level would this target?
      options:
        - Beginner
        - Intermediate
        - Advanced
        - All levels
    validations:
      required: true
  - type: textarea
    id: customer-relevance
    attributes:
      label: Customer relevance
      description: How would this scenario help in real customer conversations? What partner or customer pain point does it address?
      placeholder: "Partners frequently ask about..."
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Must have — critical gap
        - Should have — would significantly improve the training
        - Nice to have — helpful but not urgent
    validations:
      required: true
